{% assign cat = include.post.categories | first %}
<a class="card" href="{{ include.post.url | relative_url }}">
  <div class="card-thumb" data-cat="{{ cat }}">
    {% if include.post.image %}
      <img src="{{ include.post.image | relative_url }}" alt="">
    {% else %}
      <span class="thumb-fallback">{{ site.data.categories[cat] }}</span>
    {% endif %}
  </div>
  <div class="card-body">
    <span class="chip" data-cat="{{ cat }}">{{ site.data.categories[cat] }}</span>
    <h3 class="card-title">{{ include.post.title }}</h3>
    <time class="card-date">{{ include.post.date | date: "%Y.%m.%d" }}</time>
  </div>
</a>
