<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="tabs">
      {% for item in site.data.categories %}
        <a href="{{ site.baseurl }}/{{ item[0] }}/" class="tab{% if page.cat == item[0] %} is-active{% endif %}">{{ item[1] }}</a>
      {% endfor %}
      <a href="{{ '/new/' | relative_url }}" class="tab tab-accent{% if page.url == '/new/' %} is-active{% endif %}">새 업로드</a>
    </nav>
  </div>
</header>

<main class="wrap main">
{{ content }}
</main>

<footer class="site-footer">
  <div class="wrap">© {{ 'now' | date: "%Y" }} {{ site.title }}</div>
</footer>

</body>
</html>
